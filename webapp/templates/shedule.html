<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <!-- Навигация по неделям -->
        <div class="week-nav">
            <button class="nav-btn" id="prevWeek">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="week-info" id="weekInfo">
                <span class="week-dates" id="weekDates">Загрузка...</span>
            </div>
            <button class="nav-btn" id="nextWeek">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <!-- Табы дней недели -->
        <div class="days-tabs" id="daysTabs">
            <!-- Заполняется JS -->
        </div>

        <!-- Контент расписания -->
        <div class="schedule-content" id="scheduleContent">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Загрузка расписания...</p>
            </div>
        </div>

        <!-- Кнопка "Сегодня" -->
        <button class="today-btn" id="todayBtn">Сегодня</button>
    </div>

    <script>
        const GROUP_ID = "{{ group_id }}";
    </script>
    <script src="/static/app.js"></script>
</body>
</html>
